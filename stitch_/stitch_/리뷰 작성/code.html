<body class="bg-background font-body-md text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 glass-effect border-b border-outline-variant/30 shadow-sm">
<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-7xl mx-auto">

<h1 class="font-headline-md text-headline-md font-bold tracking-tighter text-ocean-blue">리뷰 작성</h1>

</div>
</header>
<main class="pt-24 px-container-margin max-w-2xl mx-auto space-y-8">

</div>
<div class="flex flex-col">
<h2 class="font-title-lg text-title-lg text-on-surface">제주 오션 럭셔리 요트 투어</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
                    방문일: 2023.11.24
                </p>
</div>
</section>
<!-- Star Rating Selector -->
<section class="text-center space-y-4">
<h3 class="font-title-lg text-title-lg">경험이 어떠셨나요?</h3>
<div class="flex justify-center gap-2" id="star-container">
<button class="star-btn transition-transform duration-200 hover:scale-110 active:scale-90" data-rating="1">
<span class="material-symbols-outlined text-[40px] text-surface-variant">star</span>
</button>
<button class="star-btn transition-transform duration-200 hover:scale-110 active:scale-90" data-rating="2">
<span class="material-symbols-outlined text-[40px] text-surface-variant">star</span>
</button>
<button class="star-btn transition-transform duration-200 hover:scale-110 active:scale-90" data-rating="3">
<span class="material-symbols-outlined text-[40px] text-surface-variant">star</span>
</button>
<button class="star-btn transition-transform duration-200 hover:scale-110 active:scale-90" data-rating="4">
<span class="material-symbols-outlined text-[40px] text-surface-variant">star</span>
</button>
<button class="star-btn transition-transform duration-200 hover:scale-110 active:scale-90" data-rating="5">
<span class="material-symbols-outlined text-[40px] text-surface-variant">star</span>
</button>

<!-- Photo Upload Section -->

<div class="relative">
<textarea class="w-full h-48 bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-ocean-blue/20 focus:border-ocean-blue transition-all placeholder:text-outline/50" id="review-text" placeholder="생생한 경험을 공유해 주세요! (장소의 분위기, 서비스, 팁 등)"></textarea>
<div class="absolute bottom-4 right-4 font-label-md text-label-md text-outline">
<span id="char-count">0</span>/1000
                </div>
</div>

<!-- Fixed Bottom Bar with Submit Button -->
<div class="fixed bottom-0 w-full bg-surface/80 glass-effect border-t border-outline-variant/30 py-4 px-container-margin z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-coral text-white font-headline-md text-headline-md rounded-xl shadow-[0px_4px_12px_rgba(255,127,80,0.3)] submit-button-active transition-all flex items-center justify-center gap-2" id="submit-btn">
                리뷰 등록하기
            </button>
</div>
</div>
<script>
        // Interactive Star Rating
        const stars = document.querySelectorAll('.star-btn');
        let currentRating = 0;

        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                currentRating = index + 1;
                updateStars();
            });

            star.addEventListener('mouseenter', () => {
                highlightStars(index + 1);
            });

            star.addEventListener('mouseleave', () => {
                updateStars();
            });
        });

        function highlightStars(count) {
            stars.forEach((star, index) => {
                const icon = star.querySelector('.material-symbols-outlined');
                if (index < count) {
                    icon.classList.add('star-active');
                    icon.innerText = 'star';
                } else {
                    icon.classList.remove('star-active');
                    icon.innerText = 'star';
                }
            });
        }

        function updateStars() {
            stars.forEach((star, index) => {
                const icon = star.querySelector('.material-symbols-outlined');
                if (index < currentRating) {
                    icon.classList.add('star-active');
                    icon.innerText = 'star';
                } else {
                    icon.classList.remove('star-active');
                    icon.innerText = 'star';
                }
            });
        }

        // Character Count
        const textarea = document.getElementById('review-text');
        const charCount = document.getElementById('char-count');

        textarea.addEventListener('input', () => {
            const length = textarea.value.length;
            charCount.innerText = length;
            if (length > 1000) {
                textarea.value = textarea.value.substring(0, 1000);
            }
        });

        // Submit Button Interaction
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.addEventListener('click', () => {
            if (currentRating === 0) {
                alert('평점을 선택해 주세요!');
                return;
            }
            if (textarea.value.trim().length < 10) {
                alert('리뷰 내용을 10자 이상 작성해 주세요.');
                return;
            }
            
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 등록 중...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');

            setTimeout(() => {
                alert('리뷰가 성공적으로 등록되었습니다!');
                window.history.back();
            }, 1500);
        });

        // Simple photo upload simulation
        const photoUpload = document.getElementById('photo-upload');
        photoUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                // In a real app, we'd append previews here
                console.log(`${e.target.files.length} photos selected`);
            }
        });
    </script>
